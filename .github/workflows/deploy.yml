name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # 支持手动触发

# 环境变量（非敏感配置）
env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/economic-server

jobs:
  # ===== 第 1 步：CI 检查 =====
  ci:
    name: CI Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Enable Corepack & install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm --filter @economic/server lint || true
        # 若 lint 未配置可跳过，有配置则去掉 || true

      - name: Run tests
        run: pnpm --filter @economic/server test || true
        # 若测试未配置可跳过，有测试则去掉 || true

  # ===== 第 2 步：构建 & 推送 Docker 镜像 =====
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== 第 3 步：部署到服务器 =====
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "===== 拉取最新镜像 ====="
            docker pull ${{ env.IMAGE_NAME }}:latest

            echo "===== 停止并移除旧容器 ====="
            docker stop economic-server || true
            docker rm economic-server || true

            echo "===== 启动新容器 ====="
            docker run -d \
              --name economic-server \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file /opt/economic/.env.production \
              --network economic_default \
              ${{ env.IMAGE_NAME }}:latest

            echo "===== 清理旧镜像 ====="
            docker image prune -f

            echo "===== 部署完成 ====="
            docker ps | grep economic-server
