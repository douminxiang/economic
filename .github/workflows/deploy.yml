name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/economic-server

jobs:
  ci:
    name: CI Check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://root:dummy@localhost:3306/economic
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/server && pnpm exec prisma generate

      - name: Lint
        run: pnpm --filter @economic/server lint || true

      - name: Test
        run: pnpm --filter @economic/server test || true

      - name: Build server
        run: pnpm run build:server || true

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull and save images
        run: |
          docker pull ${{ env.IMAGE_NAME }}:latest
          docker save ${{ env.IMAGE_NAME }}:latest -o "${{ github.workspace }}/images.tar"
          sudo chmod a+r "${{ github.workspace }}/images.tar"
          ls -la "${{ github.workspace }}/images.tar"

      - name: Copy files to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "${{ github.workspace }}/images.tar" \
            "${{ github.workspace }}/scripts/server-docker-compose.yml" \
            "$SSH_USER@$SSH_HOST:/opt/economic/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:latest
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE,DB_PASSWORD
          script: |
            set -e
            cd /opt/economic
            mv -f server-docker-compose.yml docker-compose.yml

            echo "===== Load images ====="
            docker load -i images.tar
            rm -f images.tar

            echo "===== Deploy stack ====="
            export IMAGE DB_PASSWORD
            export DATABASE_URL="mysql://root:$(python3 -c 'import urllib.parse,os; print(urllib.parse.quote(os.environ["DB_PASSWORD"], safe=""))')@db:3306/economic"
            docker compose up -d server

            docker image prune -f
            sleep 30
            curl -fsS http://127.0.0.1:3000/health
            docker compose ps
