name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm --filter @economic/server lint || echo "No lint script configured"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @economic/server test || echo "No test script configured"

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      DATABASE_URL: mysql://root:dummy@localhost:3306/economic
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/server && npx prisma generate

      - name: Build NestJS server
        run: pnpm run build:server

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Prepare release keystore
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KS="apps/mobile/android/app/release.keystore"
          PROPS="apps/mobile/android/keystore.properties"
          rm -f "$KS" "$PROPS"

          if [ -z "${KEYSTORE_B64}" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 is not set — bundleRelease will use debug.keystore"
            exit 0
          fi

          echo "$KEYSTORE_B64" | tr -d '\n\r ' | base64 -d > "$KS"
          if [ ! -s "$KS" ]; then
            echo "::error::Decoded keystore is empty. Re-encode with: base64 -w0 your-release.keystore"
            exit 1
          fi

          if ! keytool -list -keystore "$KS" -storepass "$STORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "::error::Keystore validation failed. Check ANDROID_KEYSTORE_BASE64 (JKS or PKCS12), STORE_PASSWORD, and KEY_ALIAS."
            keytool -list -keystore "$KS" -storepass "$STORE_PASSWORD" 2>&1 | head -20 || true
            exit 1
          fi

          {
            echo "storeFile=release.keystore"
            echo "storePassword=${STORE_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "keyPassword=${KEY_PASSWORD}"
          } > "$PROPS"
          echo "Release keystore configured for alias: ${KEY_ALIAS}"

      - name: Build AAB
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          chmod +x node_modules/hermes-compiler/hermesc/linux64-bin/hermesc
          chmod +x apps/mobile/android/gradlew
          cd apps/mobile/android && ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: apps/mobile/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: rm -f apps/mobile/android/app/release.keystore apps/mobile/android/keystore.properties
