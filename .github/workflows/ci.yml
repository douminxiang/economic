name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm --filter @economic/server lint || echo "No lint script configured"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @economic/server test || echo "No test script configured"

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      DATABASE_URL: mysql://root:dummy@localhost:3306/economic
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/server && npx prisma generate

      - name: Build NestJS server
        run: pnpm run build:server

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Decode keystore
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > apps/mobile/android/app/release.keystore
          cat > apps/mobile/android/keystore.properties << EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build AAB
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cd apps/mobile/android && ./gradlew assembleRelease

      - name: Upload AAB artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: rm -f apps/mobile/android/app/release.keystore apps/mobile/android/keystore.properties
