version: "3.8"

# 在仓库根目录执行：
#   docker compose -f apps/server/docker-compose.yml up -d

services:
  server:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    container_name: economic-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://root:${DB_PASSWORD}@db:3306/economic?connection_limit=50
    depends_on:
      db:
        condition: service_healthy
    networks:
      - economic-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  db:
    image: mariadb:11.4
    container_name: economic-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: economic
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - economic-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: economic-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../nginx/ssl:/etc/nginx/ssl:ro
      - ../../nginx/logs:/var/log/nginx
    depends_on:
      server:
        condition: service_healthy
    networks:
      - economic-net
    profiles:
      - with-nginx

networks:
  economic-net:
    name: economic_default
    driver: bridge

volumes:
  db-data:
    driver: local
