events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ===== 日志格式 =====
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ===== 基础配置 =====
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 50M;  # 支持文件上传

    # ===== Gzip 压缩 =====
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css text/xml text/javascript
                   application/javascript application/xml+rss application/json;

    # ===== 上游服务（NestJS）=====
    upstream economic_server {
        server server:3000;
        keepalive 32;
    }

    # ===== HTTP → HTTPS 重定向 =====
    server {
        listen 80;
        server_name your-domain.com www.your-domain.com;

        # Let's Encrypt 验证用（申请证书时需要）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其他请求全部跳转到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===== HTTPS 主服务 =====
    server {
        listen 443 ssl http2;
        server_name your-domain.com www.your-domain.com;

        # ===== SSL 证书（Let's Encrypt 路径示例）=====
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers        HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ===== 安全头 =====
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # ===== API 代理（NestJS 后端）=====
        location /api/ {
            proxy_pass http://economic_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ===== WebSocket 代理（Socket.IO）=====
        location /socket.io/ {
            proxy_pass http://economic_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ===== 健康检查 =====
        location /health {
            proxy_pass http://economic_server;
            access_log off;
        }

        # ===== 静态文件（OSS 回源或本地 uploads）=====
        location /uploads/ {
            proxy_pass http://economic_server;
            # 若使用 OSS，可直接回源到 OSS：
            # proxy_pass https://your-bucket.oss-cn-hangzhou.aliyuncs.com;
        }

        # ===== 根路径（如需部署前端，可指向前端构建产物）=====
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
}
